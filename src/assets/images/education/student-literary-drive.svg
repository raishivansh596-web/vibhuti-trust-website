  <path d="M310 242 V300 C310 325 490 325 490 300 V242" fill="none" stroke="#800020" stroke-width="8" stroke-linecap="round"/>
  <path d="M510 235 V310" stroke="#D4AF37" stroke-width="6" stroke-linecap="round"/>
  <circle cx="510" cy="318" r="8" fill="#D4AF37"/>

  <!-- Books Illustration -->
  <rect x="280" y="380" width="240" height="24" rx="4" fill="#800020"/>
  <rect x="300" y="352" width="200" height="24" rx="4" fill="#E86A17"/>
