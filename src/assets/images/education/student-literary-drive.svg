  </defs>
  <rect width="800" height="600" fill="url(#eduGrad)"/>
  <rect x="40" y="40" width="720" height="520" rx="20" fill="none" stroke="#E86A17" stroke-width="2" stroke-dasharray="8 8" opacity="0.4"/>
  
