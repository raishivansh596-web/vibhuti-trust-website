      <stop offset="100%" stop-color="#FFE8D6"/>
    </linearGradient>
    <linearGradient id="saffron" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E86A17"/>
      <stop offset="100%" stop-color="#F58220"/>
